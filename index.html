        @keyframes vtlColorChange {

        @keyframes bloom {

            60% { transform: scale(1.2) rotate(10deg) translateY(-10px); opacity: 1; filter: brightness(1.2); }

        const parseCSV = (str) => {
            const arr = [];
            let quote = false;
            let row = 0, col = 0;
            arr[row] = []; arr[row][col] = '';
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
                if (cc === '"') { quote = !quote; continue; }
                if (cc === ',' && !quote) { ++col; arr[row][col] = ''; continue; }
                if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; arr[row] = []; arr[row][col] = ''; ++c; continue; }
                if (cc === '\n' && !quote) { ++row; col = 0; arr[row] = []; arr[row][col] = ''; continue; }
                if (cc === '\r' && !quote) { ++row; col = 0; arr[row] = []; arr[row][col] = ''; continue; }
                arr[row][col] += cc;
            }
            return arr;
        };

                if (qs.length === 0) throw new Error("Sheet rỗng");
                setPoolQuestions(qs);

                        <div className="grid grid-cols-2 md:grid-cols-3 gap-6 md:gap-12 w-full px-4">
                          {CUTE_BOXES.map(box => (
                            <button key={box.id} onClick={() => handleOpenGift(box)} className={`bg-gradient-to-br ${box.color} p-10 md:p-16 rounded-[3rem] shadow-xl transform transition-all duration-300 hover:scale-110 hover:-translate-y-4 border-8 border-white/20 flex flex-col items-center justify-center gap-8 hover:shadow-[0_0_50px_rgba(255,255,255,0.4)] group`}>
                              <span className="text-[100px] md:text-[150px] drop-shadow-xl group-hover:animate-bounce">{box.icon}</span>
                              <span className="text-white font-black text-2xl md:text-4xl drop-shadow-md">{box.name}</span>
                            </button>
                          ))}
                        </div>
                      </div>
                    )}

                    {giftModal.status === 'opening' && giftModal.selectedBox && (
                      <div className="flex flex-col items-center">
                        <h2 className="text-6xl md:text-8xl font-black text-white mb-20 animate-pulse drop-shadow-2xl">
                          Đang mở hộp {giftModal.selectedBox.name}...
                        </h2>
                        <div className="relative group scale-150 animate-intense-shake">
                          <div className="absolute inset-0 rounded-full blur-3xl animate-pulse scale-150 opacity-60 bg-white"></div>
                          <div className={`relative z-10 bg-gradient-to-br ${giftModal.selectedBox.color} p-20 md:p-24 rounded-[4rem] border-8 border-white/40 shadow-[0_0_100px_rgba(255,255,255,0.5)] flex items-center justify-center`}>
                            <span className="text-[180px] md:text-[220px] drop-shadow-2xl">{giftModal.selectedBox.icon}</span>
                          </div>
                        </div>
                      </div>
                    )}

                    {giftModal.status === 'revealed' && (
                      <div className="animate-in zoom-in duration-700 flex flex-col items-center">
                        <div className="text-5xl text-yellow-300 font-bold mb-10 tracking-widest uppercase animate-bounce drop-shadow-xl">🎉 Tèn Ten Tén Ten 🎉</div>
                        <div className={`bg-gradient-to-br ${giftModal.selectedBox?.color || 'from-slate-800 to-slate-900'} border-8 border-white/30 p-16 md:p-24 rounded-[4rem] shadow-[0_0_150px_rgba(255,255,255,0.3)] backdrop-blur-xl relative overflow-hidden w-full max-w-5xl`}>
                          <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[400px] opacity-10 pointer-events-none">{giftModal.selectedBox?.icon}</div>
                          <h1 className="text-6xl md:text-8xl lg:text-9xl font-black text-white leading-tight relative z-10 drop-shadow-2xl">{giftModal.result}</h1>
                        </div>
                        <button onClick={() => setGiftModal({ show: false, status: 'menu', result: '', selectedBox: null })} className="mt-16 px-16 py-6 bg-white hover:bg-slate-200 text-slate-900 rounded-full font-black text-3xl md:text-4xl tracking-wider transition-transform hover:scale-110 shadow-2xl">
                          Đóng Hộp Quà
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* MODAL CÀI ĐẶT TÍCH HỢP QUẢN LÝ THƯ VIỆN */}
              {showSettings && (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md animate-in fade-in">
                  <div className="bg-slate-900 border-2 border-slate-700 rounded-3xl w-full max-w-6xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                    <div className="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-950">
                      <h3 className="text-3xl font-bold text-white flex items-center gap-3"><IconSettings /> Quản lý Bài Học</h3>
                      <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-white p-2 bg-slate-800 rounded-full transition-colors"><IconX /></button>
                    </div>

                    <div className="flex-1 overflow-hidden grid grid-cols-1 lg:grid-cols-2">
                      
                      {/* Cột trái: Form cấu hình hiện tại */}
                      <div className="p-8 border-r border-slate-800 overflow-y-auto custom-scroll">
                        <h4 className="text-xl font-semibold text-blue-400 mb-6 uppercase tracking-wider">Cấu hình Đang chạy</h4>
                        <form onSubmit={handleApplySettings} className="space-y-6">
                          <div>
                            <label className="block text-base font-medium text-slate-400 mb-2">Tổng số học sinh (Không bị loại trừ)</label>
                            <input type="number" name="students" value={localSettings.students} onChange={e => setLocalSettings({...localSettings, students: e.target.value})} min="1" max="999" className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-xl text-white focus:ring-2 focus:ring-blue-500 focus:outline-none" required />
                          </div>
                          <div>
                            <label className="block text-base font-medium text-slate-400 mb-2">ID Google Sheet (Câu hỏi bài giảng)</label>
                            <input type="text" name="sheetId" value={localSettings.sheetId} onChange={e => setLocalSettings({...localSettings, sheetId: e.target.value})} placeholder="Nhập ID từ URL Google Sheet..." className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-lg text-white focus:ring-2 focus:ring-blue-500 focus:outline-none placeholder-slate-600" />
                            <p className="text-xs text-slate-500 mt-2">Cột A: Câu hỏi | Cột B: Đáp án | Cột C: Gợi ý (Tuỳ chọn)</p>
                          </div>
                          {!localSettings.sheetId && (
                            <div>
                              <label className="block text-base font-medium text-slate-400 mb-2">Số lượng câu hỏi mặc định (Sinh tự động)</label>
                              <input type="number" name="questions" value={localSettings.questions} onChange={e => setLocalSettings({...localSettings, questions: e.target.value})} min="1" max="999" className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-xl text-white focus:ring-2 focus:ring-blue-500 focus:outline-none" required />
                            </div>
                          )}

                          {/* Khu vực lưu bài học hiện tại */}
                          <div className="mt-8 p-6 bg-blue-900/10 border border-blue-800/30 rounded-2xl">
                             <h5 className="text-blue-300 font-medium mb-4 flex items-center gap-2"><IconSave /> Lưu nhanh ID hiện tại vào Thư Viện</h5>
                             <div className="flex flex-col gap-3">
                                <input type="text" placeholder="Tên bài (VD: Ôn tập hàm số)" value={saveForm.name} onChange={e => setSaveForm({...saveForm, name: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500" />
                                <div className="flex gap-3">
                                   <select value={saveForm.grade} onChange={e => setSaveForm({...saveForm, grade: e.target.value})} className="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none w-1/3">
                                      {GRADES.map(g => <option key={g} value={g}>Khối {g}</option>)}
                                   </select>
                                   <button type="button" onClick={handleSaveToLibrary} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-bold py-2 transition-colors">Lưu Bài</button>
                                </div>
                             </div>
                          </div>

                          <div className="pt-6 mt-6 border-t border-slate-800">
                            <button type="submit" className="w-full px-6 py-4 rounded-xl bg-gradient-to-r from-green-600 to-emerald-600 text-white font-bold text-xl hover:from-green-500 hover:to-emerald-500 transition-colors shadow-lg shadow-green-500/20">Áp Dụng & Tải Bài Giảng</button>
                          </div>
                        </form>
                      </div>

                      {/* Cột phải: Cây Thư Viện Bài Học */}
                      <div className="p-8 bg-slate-950/50 overflow-y-auto custom-scroll">
                        <h4 className="text-xl font-semibold text-yellow-400 mb-6 uppercase tracking-wider">Thư viện Bài Học (Lưu trữ)</h4>
                        
                        {savedSheets.length === 0 ? (
                           <div className="text-center text-slate-500 py-10 border-2 border-dashed border-slate-800 rounded-2xl">
                              <IconFolder isOpen={false} />
                              <p className="mt-4">Chưa có bài học nào được lưu.</p>
                           </div>
                        ) : (
                           <div className="flex flex-col gap-2">
                             {GRADES.map(grade => {
                                const sheetsInGrade = savedSheets.filter(s => s.grade === grade);
                                if (sheetsInGrade.length === 0) return null;
                                const isOpen = expandedGrades[grade];
                                
                                return (
                                   <div key={grade} className="bg-slate-800/40 rounded-xl border border-slate-700/50 overflow-hidden transition-all">
                                      {/* Header của Khối */}
                                      <button 
                                        onClick={() => toggleGradeTree(grade)} 
                                        className={`w-full flex items-center gap-3 px-5 py-4 text-left font-bold transition-colors ${isOpen ? 'bg-slate-800 text-yellow-400' : 'hover:bg-slate-800 text-slate-300'}`}
                                      >
                                         <IconFolder isOpen={isOpen} /> 
                                         <span className="text-lg">Khối {grade}</span>
                                         <span className="ml-auto text-xs bg-slate-900 px-2 py-1 rounded-full text-slate-400">{sheetsInGrade.length} bài</span>
                                      </button>
                                      
                                      {/* Danh sách File bài học */}
                                      {isOpen && (
                                         <div className="p-3 bg-slate-900/50 flex flex-col gap-2">
                                            {sheetsInGrade.map(sheet => (
                                               <div key={sheet.id} className={`flex items-center justify-between p-3 rounded-lg border border-slate-700/50 transition-all ${localSettings.sheetId === sheet.id ? 'bg-blue-600/20 border-blue-500/50' : 'bg-slate-800 hover:bg-slate-700'}`}>
                                                  <div 
                                                    className="flex items-center gap-3 flex-1 cursor-pointer"
                                                    onClick={() => handleLoadSavedSheet(sheet.id)}
                                                  >
                                                     <div className={localSettings.sheetId === sheet.id ? 'text-blue-400' : 'text-slate-400'}><IconFile /></div>
                                                     <div className="flex flex-col">
                                                        <span className={`font-medium ${localSettings.sheetId === sheet.id ? 'text-blue-300' : 'text-slate-200'}`}>{sheet.name}</span>
                                                     </div>
                                                  </div>
                                                  <button 
                                                    onClick={() => handleDeleteSavedSheet(sheet.id)}
                                                    className="p-2 bg-slate-900 rounded-lg hover:bg-red-500/20 transition-colors ml-3"
                                                    title="Xoá bài học này"
                                                  >
                                                     <IconTrash />
                                                  </button>
                                               </div>
                                            ))}
                                         </div>
                                      )}
                                   </div>
                                );
                             })}
                           </div>
                        )}
                      </div>

                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // ==========================================
        // COMPONENT ANIMATION QUAY SỐ
        // ==========================================
        function SpinEngine({ target, mode, totalStudents, totalQuestions }) {
          const [displayData, setDisplayData] = useState({ s: '...', q: '...' });
          const [visualState, setVisualState] = useState(''); 
          const actualModeRef = useRef(mode);

          useEffect(() => {
            if (mode === 'random') {
              const modes = ['wheel', 'flash', 'slot', 'reveal', 'pulse', 'colorful', 'fakeout']; 
              actualModeRef.current = modes[Math.floor(Math.random() * modes.length)];
            } else actualModeRef.current = mode;
          }, [mode]);

          useEffect(() => {
            let isActive = true;
            const currentMode = actualModeRef.current;
            const runAnimation = async () => {
              const duration = 3800;
              const startTime = Date.now();

              if (currentMode === 'fakeout') {
                let delay = 20;
                let hasPaused = false;
                while (Date.now() - startTime < duration - 200 && isActive) {
                  const elapsed = Date.now() - startTime;
                  if (elapsed > 2000 && !hasPaused) {
                    hasPaused = true;
                    setDisplayData({ s: randomInt(1, totalStudents), q: randomInt(1, totalQuestions) });
                    setVisualState('text-green-400 scale-[1.8] drop-shadow-[0_0_50px_rgba(74,222,128,0.8)]');
                    await sleep(500); 
                    delay = 10; 
                  } else {
                    setDisplayData({ s: randomInt(1, totalStudents), q: randomInt(1, totalQuestions) });
                    setVisualState(randomColor() + ' scale-110');
                    await sleep(delay);
                    if (hasPaused) { delay += 12; } else { delay += 3; }
                  }
                }
              } else if (currentMode === 'flash') {
                let delay = 20;
                while (Date.now() - startTime < duration - 200 && isActive) {
                  setDisplayData({ s: randomInt(1, totalStudents), q: randomInt(1, totalQuestions) });
                  setVisualState(randomColor() + ' scale-110'); 
                  await sleep(delay);
                  const elapsed = Date.now() - startTime;
                  if (elapsed > 1000) delay = 50;
                  if (elapsed > 2000) delay = 100;
                  if (elapsed > 3000) delay = 300;
                  setVisualState(randomColor() + ' scale-100');
                }
              } else if (currentMode === 'colorful') {
                let delay = 80;
                while (Date.now() - startTime < duration - 200 && isActive) {
                  setDisplayData({ s: randomInt(1, totalStudents), q: randomInt(1, totalQuestions) });
                  setVisualState(`style-bg-hue rotate-${Math.random() > 0.5 ? '3' : '-3'}`);
                  await sleep(delay);
                }
              } else if (currentMode === 'pulse') {
                let delay = 400; 
                setVisualState('text-red-500 scale-150 blur-sm'); 
                while (Date.now() - startTime < duration - 500 && isActive) {
                  setDisplayData({ s: randomInt(1, totalStudents), q: randomInt(1, totalQuestions) });
                  setVisualState('text-red-500 scale-[2] blur-md opacity-50');
                  await sleep(delay/2);
                  if(!isActive) break;
                  setVisualState('text-red-500 scale-110 blur-sm opacity-100');
                  await sleep(delay/2);
                  delay = Math.max(100, delay - 80); 
                }
              } else if (currentMode === 'reveal') {
                setVisualState('glitch-text text-white');
                while (Date.now() - startTime < duration - 300 && isActive) {
                  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*';
                  let rs = '', rq = '';
                  for(let i=0; i<3; i++) rs += chars.charAt(Math.floor(Math.random() * chars.length));
                  for(let i=0; i<2; i++) rq += chars.charAt(Math.floor(Math.random() * chars.length));
                  setDisplayData({ s: rs, q: rq });
                  await sleep(50);
                }
              } else if (currentMode === 'wheel') {
                setVisualState('wheel-mode');
                let delay = 30;
                while (Date.now() - startTime < duration - 500 && isActive) {
                  setDisplayData({ s: randomInt(1, totalStudents), q: randomInt(1, totalQuestions) });
                  await sleep(delay); delay += 5; 
                }
              } else if (currentMode === 'slot') {
                 let delay = 40;
                 while (Date.now() - startTime < duration - 200 && isActive) {
                  setDisplayData({ s: randomInt(1, totalStudents), q: randomInt(1, totalQuestions) });
                  await sleep(delay);
                }
              }
              
              if (isActive) {
                setDisplayData({ s: target.student, q: target.question });
                setVisualState('text-white scale-125 transition-all duration-300');
              }
            };
            runAnimation();
            return () => { isActive = false; };
          }, [target, totalStudents, totalQuestions]);

          const activeMode = actualModeRef.current;

          if (activeMode === 'wheel') {
            return (
              <div className="relative w-full h-full flex items-center justify-center overflow-hidden">
                <div className="absolute w-[1500px] h-[1500px] rounded-full opacity-30 blur-xl animate-spin-slow" style={{ background: 'conic-gradient(from 0deg, #3b82f6, #8b5cf6, #ec4899, #eab308, #22c55e, #3b82f6)' }}></div>
                <div className="z-10 text-center bg-slate-900/80 p-12 md:p-20 rounded-full shadow-2xl backdrop-blur-sm border-4 border-blue-500/30 border-dashed animate-spin-slow" style={{ animationDuration: '4s' }}>
                  <div className="animate-spin-slow" style={{ animationDirection: 'reverse', animationDuration: '4s' }}>
                     <h3 className="text-5xl md:text-7xl font-bold text-blue-300 mb-6">Đang Quay...</h3>
                     <div className="text-[120px] md:text-[250px] leading-none font-black text-white">{displayData.s}</div>
                  </div>
                </div>
              </div>
            );
          }

          if (activeMode === 'slot') {
            return (
              <div className="flex gap-8 md:gap-16 items-center justify-center text-[80px] md:text-[150px] lg:text-[200px] font-black font-mono">
                <div className="bg-slate-800 p-12 md:p-16 rounded-[2rem] border-y-8 border-blue-500 shadow-inner h-64 md:h-[350px] overflow-hidden flex items-center">
                  <div className="animate-bounce text-blue-400">HS {displayData.s}</div>
                </div>
                <div className="text-slate-600 text-6xl md:text-9xl">-</div>
                <div className="bg-slate-800 p-12 md:p-16 rounded-[2rem] border-y-8 border-yellow-500 shadow-inner h-64 md:h-[350px] overflow-hidden flex items-center">
                  <div className="animate-pulse text-yellow-400">CÂU {displayData.q}</div>
                </div>
              </div>
            );
          }

          if (activeMode === 'colorful') {
             return (
                <div className="absolute inset-0 flex flex-col items-center justify-center transition-colors duration-100" style={{ backgroundColor: `hsl(${Math.random() * 360}, 70%, 20%)` }}>
                  <h2 className={`text-[120px] md:text-[250px] lg:text-[350px] leading-none font-black drop-shadow-2xl transition-transform duration-75 ${visualState}`}>{displayData.s}</h2>
                  <div className="text-6xl md:text-8xl font-bold mt-8 text-white/80">Câu hỏi: {displayData.q}</div>
                </div>
             )
          }

          // Render mặc định cho Flash, Reveal, Pulse và Fakeout
          return (
            <div className={`text-center transition-all duration-100 ${visualState} ${activeMode === 'reveal' ? 'matrix-bg w-full h-full flex flex-col items-center justify-center' : ''}`}>
              <div className="text-4xl md:text-6xl lg:text-7xl text-slate-400 mb-8 tracking-widest uppercase font-semibold">Đang tìm kiếm...</div>
              <div className="text-[150px] md:text-[280px] lg:text-[400px] font-black leading-none mb-8">{displayData.s}</div>
              <div className="text-6xl md:text-8xl lg:text-9xl font-bold text-slate-300">Câu <span className="opacity-80">{displayData.q}</span></div>
            </div>
          );
        }

        // Khởi chạy App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
