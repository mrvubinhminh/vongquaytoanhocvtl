        @keyframes vtlColorChange {

            animation: vtlColorChange 4s linear infinite;
        }

        /* Hiệu ứng Hoa Hướng Dương Nở */
        @keyframes bloom {
            0% { transform: scale(0) rotate(-60deg) translateY(50px); opacity: 0; filter: brightness(0.5); }
            60% { transform: scale(1.2) rotate(10deg) translateY(-10px); opacity: 1; filter: brightness(1.2); }
            100% { transform: scale(1) rotate(0deg) translateY(0); opacity: 1; filter: brightness(1); }
        }
        .sunflower-bloom {
            animation: bloom 2.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: center bottom;
        }

        /* Các hiệu ứng Animation cũ */

        .glitch-text { text-shadow: 2px 0 red, -2px 0 blue; animation: glitch 0.2s linear infinite; }
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 1px) }
            40% { transform: translate(-1px, -1px) }
            60% { transform: translate(2px, 1px) }
            80% { transform: translate(1px, -1px) }
            100% { transform: translate(0) }
        }
        .matrix-bg {
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(16,185,129,0.2) 50%, rgba(0,0,0,0) 100%);

            animation: matrix-scan 2s linear infinite;
        }
        @keyframes matrix-scan { 0% { background-position: 0% -100%; } 100% { background-position: 0% 100%; } }
        
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .animate-intense-shake {
            animation: intense-shake 0.3s cubic-bezier(.36,.07,.19,.97) both infinite;
            transform: translate3d(0, 0, 0);
        }
        @keyframes intense-shake {
            10%, 90% { transform: translate3d(-2px, 0, 0) rotate(-2deg); }
            20%, 80% { transform: translate3d(4px, 0, 0) rotate(2deg); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0) rotate(-4deg); }
            40%, 60% { transform: translate3d(6px, 0, 0) rotate(4deg); }
        }

        /* HIỆU ỨNG HỘP QUÀ LƠ LỬNG MỚI */
        @keyframes floatBox {

        const MathText = ({ text }) => {

          useEffect(() => {
            if (window.MathJax && window.MathJax.typesetPromise) {
              window.MathJax.typesetPromise([nodeRef.current]).catch(err => console.log(err));

        const parseCSV = (str) => {
            const arr = [];
            let quote = false;
            let row = 0, col = 0;
            arr[row] = []; arr[row][col] = '';
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
                if (cc === '"') { quote = !quote; continue; }
                if (cc === ',' && !quote) { ++col; arr[row][col] = ''; continue; }
                if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; arr[row] = []; arr[row][col] = ''; ++c; continue; }
                if (cc === '\n' && !quote) { ++row; col = 0; arr[row] = []; arr[row][col] = ''; continue; }
                if (cc === '\r' && !quote) { ++row; col = 0; arr[row] = []; arr[row][col] = ''; continue; }
                arr[row][col] += cc;
            }
            return arr;
        };

        const fireRealisticFireworks = () => {
            const duration = 10 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };
            function randomInRange(min, max) { return Math.random() * (max - min) + min; }
            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 60 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));

                                 <li className="flex gap-3"><div className="w-6 h-6 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center shrink-0 font-bold text-sm">5</div> <span><strong>In Phiếu Bằng Cài Đặt:</strong> Có thể vào Cài đặt để tạo và In ngay một <b>Phiếu Học Tập A4</b> tự động dựa vào sheet vừa nhập.</span></li>
                              </ul>
                           </section>
                           <section>
                              <h4 className="text-xl font-bold text-white mb-4 border-l-4 border-yellow-500 pl-3">💡 5 Mẹo Tối Ưu Hóa Tiết Học</h4>
                              <div className="grid gap-4">
                                 <div className="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
                                    <h5 className="font-bold text-yellow-400 mb-1">1. "Cú Lừa" Hoàn Hảo</h5>
                                    <p className="text-slate-300 text-sm">Sử dụng chế độ quay <em>"7. Cú lừa"</em>. Vòng quay sẽ giả vờ dừng lại ở 1 bạn, dừng khoảng 0.5s rồi đột ngột vút đi quay tiếp. Đây là chiêu trò tạo sự thót tim cực độ cho học sinh.</p>
                                 </div>
                                 <div className="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
                                    <h5 className="font-bold text-yellow-400 mb-1">2. Cá Nhân Hóa Cùng Học Sinh</h5>
                                    <p className="text-slate-300 text-sm">Đầu năm học, hãy mở mục <b>Cài đặt Thưởng/Phạt</b> và cùng cả lớp thảo luận thống nhất các hình phạt hay phần quà. Việc để học sinh tự chốt luật chơi sẽ khiến các em tự giác tuân thủ hơn.</p>
                                 </div>
                                 <div className="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
                                    <h5 className="font-bold text-yellow-400 mb-1">3. Phao Cứu Sinh (Gợi ý)</h5>
                                    <p className="text-slate-300 text-sm">Khi một học sinh bốc trúng câu hỏi khó và đứng hình, hãy nhấp vào <b>Icon Bóng đèn</b> góc trái để bung ra gợi ý (Cột C). Điều này giúp khích lệ tư duy học sinh một cách nhẹ nhàng.</p>
                                 </div>
                                 <div className="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
                                    <h5 className="font-bold text-yellow-400 mb-1">4. Vinh Danh Bằng Bảng Tổng Kết</h5>
                                    <p className="text-slate-300 text-sm">Cuối tiết học, hãy mở <b>Bảng Tổng Kết</b> và bấm "Xuất Ảnh". Thầy có thể gửi bức ảnh này vào nhóm Zalo của Lớp để vinh danh những bạn tích cực lên bảng.</p>
                                 </div>
                                 <div className="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
                                    <h5 className="font-bold text-yellow-400 mb-1">5. Tận Dụng Tính Năng Trọng Số (Tỷ lệ)</h5>
                                    <p className="text-slate-300 text-sm">Trong phần Cài đặt Hình Phạt, hãy để 1 ô <em>"Cộng 10 điểm (Quà ẩn)"</em> với tỷ lệ cực thấp (Ví dụ: Trọng số 1). Học sinh dù bốc trúng Hình Phạt nhưng vẫn có hy vọng mong manh trúng được Quà.</p>
                                 </div>
                              </div>
                           </section>
                       </div>
                       <div className="p-6 border-t border-slate-800 bg-slate-900 text-center shrink-0">
                           <button onClick={() => setShowHelp(false)} className="px-8 py-3 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-full transition-colors">Đã Hiểu</button>
                       </div>
                    </div>
                  </div>
                )}
              </div>

              {/* MÀN HÌNH XEM TRƯỚC IN ẤN PHIẾU HỌC TẬP (A4) */}
              {showPrintPreview && (
                <div className="min-h-screen bg-slate-800 print:bg-white pb-12 print:p-0 print:block">
                  <div className="no-print bg-slate-900 border-b border-slate-700 p-4 sticky top-0 z-50 flex justify-between items-center shadow-xl">
                     <h2 className="text-xl font-bold text-white flex items-center gap-2"><IconPrint /> Chế độ In Phiếu Học Tập</h2>
                     
                     {/* Bảng điều khiển cấu hình in */}
                     <div className="flex items-center gap-4 bg-slate-800 px-4 py-2 rounded-lg border border-slate-700">
                        <div className="flex items-center gap-2">
                           <label className="text-slate-300 text-sm font-semibold">Font chữ:</label>
                           <select 
                              value={printFont} 
                              onChange={(e) => setPrintFont(e.target.value)}
                              className="bg-slate-900 text-white border border-slate-600 rounded px-2 py-1 text-sm outline-none focus:border-blue-500"
                           >
                              <option value="font-roboto">Roboto (Mặc định)</option>
                              <option value="font-opensans">Open Sans</option>
                              <option value="font-montserrat">Montserrat</option>
                              <option value="font-nunito">Nunito</option>
                              <option value="font-lora">Lora (Có chân)</option>
                              <option value="font-merriweather">Merriweather (Có chân)</option>
                           </select>
                        </div>
                        <div className="w-px h-6 bg-slate-700"></div>
                        <div className="flex items-center gap-2">
                           <label className="text-slate-300 text-sm font-semibold">Dòng kẻ làm bài:</label>
                           <input 
                              type="number" 
                              min="0" max="10" 
                              value={printLines} 
                              onChange={(e) => setPrintLines(Number(e.target.value))}
                              className="w-16 bg-slate-900 text-white border border-slate-600 rounded px-2 py-1 text-sm outline-none focus:border-blue-500 text-center"
                           />
                        </div>
                     </div>

                     <div className="flex gap-4">
                        <button onClick={() => window.print()} className="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-bold flex items-center gap-2 shadow-lg hover:scale-105 transition-all"><IconPrint /> In Phiếu (Ctrl+P)</button>
                        <button onClick={() => setShowPrintPreview(false)} className="px-6 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-bold flex items-center gap-2 shadow-lg hover:scale-105 transition-all"><IconX /> Đóng</button>
                     </div>
                  </div>

                  {/* A4 Paper Container */}
                  <div className={`mx-auto mt-8 bg-white text-black p-[20mm] print:p-[10mm] shadow-2xl print:shadow-none w-[210mm] min-h-[297mm] print:w-full print:max-w-full print:min-h-0 print:m-0 box-border print:block ${printFont}`}>
                     <div className="text-center mb-8 border-b-2 border-black pb-4">
                        <h1 className="text-2xl font-bold uppercase mb-4 tracking-widest">Phiếu Học Tập</h1>
                        <div className="flex justify-between items-end text-base font-semibold w-full px-2">
                           <div className="flex gap-2 w-[45%]">
                              <span className="whitespace-nowrap">Chủ đề:</span>
                              <div className="border-b border-dotted border-black flex-1"></div>
                           </div>
                           <div className="flex gap-2 w-[50%]">
                              <span className="whitespace-nowrap">Họ tên:</span>
                              <div className="border-b border-dotted border-black flex-1"></div>
                              <span className="whitespace-nowrap ml-4">Lớp:</span>
                              <div className="border-b border-dotted border-black w-24"></div>
                           </div>
                        </div>
                     </div>

                     <div className="grid grid-cols-2 gap-x-6 gap-y-8 text-[12pt] print:text-[12pt] w-full max-w-full">
                        {allQuestions.map(q => (
                           <div key={q.id} className="print-break-inside-avoid text-left break-inside-avoid w-full break-words overflow-hidden">
                              <div className="mb-2 text-left leading-relaxed">
                                 <span className="font-bold">Câu {q.id}: </span>
                                 <span className="font-normal"><MathText text={q.q} /></span>
                              </div>
                              {/* Tự động render số dòng kẻ chấm mờ theo cấu hình */}
                              <div className="flex flex-col gap-0 mt-2">
                                 {Array.from({length: printLines}).map((_, i) => (
                                    <div key={i} className="border-b border-dotted border-gray-500 h-7 w-full"></div>
                                 ))}
                              </div>
                           </div>
                        ))}
                     </div>
                  </div>
                </div>
              )}
            </>
          );
        }

        // ==========================================
        // COMPONENT ANIMATION QUAY SỐ (HIỆU ỨNG TÌM NGƯỜI)
        // ==========================================
        function SpinStudentEngine({ targetStudent, totalStudents }) {
          const [displayS, setDisplayS] = useState('...');
          const [visualState, setVisualState] = useState('');
          
          useEffect(() => {
              let isActive = true;
              const runAnimation = async () => {
                  const duration = 3800;
                  const startTime = Date.now();
                  let delay = 30;
                  
                  while (Date.now() - startTime < duration - 200 && isActive) {
                      setDisplayS(randomInt(1, totalStudents));
                      setVisualState(randomColor() + ' scale-110');
                      await sleep(delay);
                      
                      const elapsed = Date.now() - startTime;
                      if (elapsed > 1500) delay = 80;
                      if (elapsed > 2500) delay = 150;
                      setVisualState(randomColor() + ' scale-100');
                  }
                  
                  if (isActive) {
                      setDisplayS(targetStudent);
                      setVisualState('text-white scale-125 transition-all duration-300');
                  }
              };
              runAnimation();
              return () => { isActive = false; };
          }, [targetStudent, totalStudents]);

          return (
              <div className={`text-center transition-all duration-100 flex flex-col items-center justify-center w-full h-full ${visualState}`}>
                <div className="text-4xl md:text-6xl text-slate-400 mb-8 tracking-widest uppercase font-semibold">Đang tìm người trả lời...</div>
                <div className="text-[150px] md:text-[280px] lg:text-[350px] font-black leading-none mb-8">{displayS}</div>
              </div>
          );
        }

        // ==========================================
        // COMPONENT ANIMATION QUAY SỐ (GỐC)
        // ==========================================
        function SpinEngine({ target, mode, totalStudents, totalQuestions }) {
          const [displayData, setDisplayData] = useState({ s: '...', q: '...' });
          const [visualState, setVisualState] = useState(''); 
          const actualModeRef = useRef(mode);

          useEffect(() => {
            if (mode === 'random') {
              const modes = ['wheel', 'flash', 'slot', 'reveal', 'pulse', 'colorful', 'fakeout']; 
              actualModeRef.current = modes[Math.floor(Math.random() * modes.length)];
            } else actualModeRef.current = mode;
          }, [mode]);

          useEffect(() => {
            let isActive = true;
            const currentMode = actualModeRef.current;
            const runAnimation = async () => {
              const duration = 3800;
              const startTime = Date.now();

              if (currentMode === 'fakeout') {
                let delay = 20;
                let hasPaused = false;
                while (Date.now() - startTime < duration - 200 && isActive) {
                  const elapsed = Date.now() - startTime;
                  if (elapsed > 2000 && !hasPaused) {
                    hasPaused = true;
                    setDisplayData({ s: randomInt(1, totalStudents), q: randomInt(1, totalQuestions) });
                    setVisualState('text-green-400 scale-[1.8] drop-shadow-[0_0_50px_rgba(74,222,128,0.8)]');
                    await sleep(500); 
                    delay = 10; 
                  } else {
                    setDisplayData({ s: randomInt(1, totalStudents), q: randomInt(1, totalQuestions) });
                    setVisualState(randomColor() + ' scale-110');
                    await sleep(delay);
                    if (hasPaused) { delay += 12; } else { delay += 3; }
                  }
                }
              } else if (currentMode === 'flash') {
                let delay = 20;
                while (Date.now() - startTime < duration - 200 && isActive) {
                  setDisplayData({ s: randomInt(1, totalStudents), q: randomInt(1, totalQuestions) });
                  setVisualState(randomColor() + ' scale-110'); 
                  await sleep(delay);
                  const elapsed = Date.now() - startTime;
                  if (elapsed > 1000) delay = 50;
                  if (elapsed > 2000) delay = 100;
                  if (elapsed > 3000) delay = 300;
                  setVisualState(randomColor() + ' scale-100');
                }
              } else if (currentMode === 'colorful') {
                let delay = 80;
                while (Date.now() - startTime < duration - 200 && isActive) {
                  setDisplayData({ s: randomInt(1, totalStudents), q: randomInt(1, totalQuestions) });
                  setVisualState(`style-bg-hue rotate-${Math.random() > 0.5 ? '3' : '-3'}`);
                  await sleep(delay);
                }
              } else if (currentMode === 'pulse') {
                let delay = 400; 
                setVisualState('text-red-500 scale-150 blur-sm'); 
                while (Date.now() - startTime < duration - 500 && isActive) {
                  setDisplayData({ s: randomInt(1, totalStudents), q: randomInt(1, totalQuestions) });
                  setVisualState('text-red-500 scale-[2] blur-md opacity-50');
                  await sleep(delay/2);
                  if(!isActive) break;
                  setVisualState('text-red-500 scale-110 blur-sm opacity-100');
                  await sleep(delay/2);
                  delay = Math.max(100, delay - 80); 
                }
              } else if (currentMode === 'reveal') {
                setVisualState('glitch-text text-white');
                while (Date.now() - startTime < duration - 300 && isActive) {
                  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*';
                  let rs = '', rq = '';
                  for(let i=0; i<3; i++) rs += chars.charAt(Math.floor(Math.random() * chars.length));
                  for(let i=0; i<2; i++) rq += chars.charAt(Math.floor(Math.random() * chars.length));
                  setDisplayData({ s: rs, q: rq });
                  await sleep(50);
                }
              } else if (currentMode === 'wheel') {
                setVisualState('wheel-mode');
                let delay = 30;
                while (Date.now() - startTime < duration - 500 && isActive) {
                  setDisplayData({ s: randomInt(1, totalStudents), q: randomInt(1, totalQuestions) });
                  await sleep(delay); delay += 5; 
                }
              } else if (currentMode === 'slot') {
                 let delay = 40;
                 while (Date.now() - startTime < duration - 200 && isActive) {
                  setDisplayData({ s: randomInt(1, totalStudents), q: randomInt(1, totalQuestions) });
                  await sleep(delay);
                }
              }
              
              if (isActive) {
                setDisplayData({ s: target.student, q: target.question });
                setVisualState('text-white scale-125 transition-all duration-300');
              }
            };
            runAnimation();
            return () => { isActive = false; };
          }, [target, totalStudents, totalQuestions]);

          const activeMode = actualModeRef.current;

          if (activeMode === 'wheel') {
            return (
              <div className="relative w-full h-full flex items-center justify-center overflow-hidden">
                <div className="absolute w-[1500px] h-[1500px] rounded-full opacity-30 blur-xl animate-spin-slow" style={{ background: 'conic-gradient(from 0deg, #3b82f6, #8b5cf6, #ec4899, #eab308, #22c55e, #3b82f6)' }}></div>
                <div className="z-10 text-center bg-slate-900/80 p-12 md:p-20 rounded-full shadow-2xl backdrop-blur-sm border-4 border-blue-500/30 border-dashed animate-spin-slow" style={{ animationDuration: '4s' }}>
                  <div className="animate-spin-slow" style={{ animationDirection: 'reverse', animationDuration: '4s' }}>
                     <h3 className="text-5xl md:text-7xl font-bold text-blue-300 mb-6">Đang Quay...</h3>
                     <div className="text-[120px] md:text-[250px] leading-none font-black text-white">{displayData.s}</div>
                  </div>
                </div>
              </div>
            );
          }

          if (activeMode === 'slot') {
            return (
              <div className="flex gap-8 md:gap-16 items-center justify-center text-[80px] md:text-[150px] lg:text-[200px] font-black font-mono">
                <div className="bg-slate-800 p-12 md:p-16 rounded-[2rem] border-y-8 border-blue-500 shadow-inner h-64 md:h-[350px] overflow-hidden flex items-center">
                  <div className="animate-bounce text-blue-400">HS {displayData.s}</div>
                </div>
                <div className="text-slate-600 text-6xl md:text-9xl">-</div>
                <div className="bg-slate-800 p-12 md:p-16 rounded-[2rem] border-y-8 border-yellow-500 shadow-inner h-64 md:h-[350px] overflow-hidden flex items-center">
                  <div className="animate-pulse text-yellow-400">CÂU {displayData.q}</div>
                </div>
              </div>
            );
          }

          if (activeMode === 'colorful') {
             return (
                <div className="absolute inset-0 flex flex-col items-center justify-center transition-colors duration-100" style={{ backgroundColor: `hsl(${Math.random() * 360}, 70%, 20%)` }}>
                  <h2 className={`text-[120px] md:text-[250px] lg:text-[350px] leading-none font-black drop-shadow-2xl transition-transform duration-75 ${visualState}`}>{displayData.s}</h2>
                  <div className="text-6xl md:text-8xl font-bold mt-8 text-white/80">Câu hỏi: {displayData.q}</div>
                </div>
             )
          }

          // Render mặc định cho Flash, Reveal, Pulse và Fakeout
          return (
            <div className={`text-center transition-all duration-100 ${visualState} ${activeMode === 'reveal' ? 'matrix-bg w-full h-full flex flex-col items-center justify-center' : ''}`}>
              <div className="text-4xl md:text-6xl lg:text-7xl text-slate-400 mb-8 tracking-widest uppercase font-semibold">Đang tìm kiếm...</div>
              <div className="text-[150px] md:text-[280px] lg:text-[400px] font-black leading-none mb-8">{displayData.s}</div>
              <div className="text-6xl md:text-8xl lg:text-9xl font-bold text-slate-300">Câu <span className="opacity-80">{displayData.q}</span></div>
            </div>
          );
        }

        // Khởi chạy App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
